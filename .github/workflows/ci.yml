name: OAK CI

on:
  push:
    branches: ["main", "oak/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check api/ memory/ oak_mcp/
      - name: Mypy type check
        run: mypy --strict api/ memory/
      - name: Check __pattern__ attributes
        run: |
          python3 -c "
          import ast, sys, pathlib
          errors = []
          for f in pathlib.Path('api').rglob('*.py'):
              if f.name.startswith('_') or 'test' in str(f):
                  continue
              src = f.read_text()
              tree = ast.parse(src)
              has_pattern = any(
                  isinstance(n, ast.Assign)
                  and any(isinstance(t, ast.Name) and t.id == '__pattern__' for t in n.targets)
                  for n in ast.walk(tree)
              )
              if not has_pattern:
                  errors.append(str(f))
          if errors:
              print('Missing __pattern__:', errors)
              sys.exit(1)
          print('All modules have __pattern__. OK.')
          "

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=api --cov=memory --cov-report=term-missing --cov-fail-under=70

  ui-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build React UI
        run: cd ui-next && npm ci && npm run build
