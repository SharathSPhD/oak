# OAK Mac Mini M4 Pro profile
# Differences from DGX: no GPU reservations, Metal backend (Ollama auto-detects),
# STALL_DETECTION_ENABLED=true, smaller default models, lower resource caps.
version: "3.9"

include:
  - docker/docker-compose.base.yml

services:
  oak-ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [oak-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Metal backend is auto-detected by Ollama on macOS — no reservations needed
    environment:
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "2"

  oak-api:
    environment:
      OAK_MODE: mini
      DATABASE_URL: postgresql://oak:oak@oak-postgres:5432/oak
      REDIS_URL: redis://oak-redis:6379
      OAK_DEFAULT_MODEL: llama3.2:3b
      OAK_CODER_MODEL: qwen2.5-coder:7b
      OAK_ANALYSIS_MODEL: llama3.2:3b
      MAX_AGENTS_PER_PROBLEM: "3"
      MAX_CONCURRENT_PROBLEMS: "1"
      MAX_HARNESS_CONTAINERS: "4"

  oak-api-proxy:
    environment:
      OLLAMA_BASE_URL: http://oak-ollama:11434
      REDIS_URL: redis://oak-redis:6379
      ROUTING_STRATEGY: stall
      STALL_DETECTION_ENABLED: "true"
      STALL_MIN_TOKENS: "15"
      LOCAL_CONFIDENCE_THRESHOLD: "0.75"

  oak-ui:
    image: oak/ui:latest
    restart: unless-stopped
    networks: [oak-net]
    ports:
      - "8501:8501"
    environment:
      OAK_API_URL: http://oak-api:8000
      OAK_MODE: mini
    depends_on:
      - oak-api

volumes:
  ollama-models:
