# OAK Base Docker Compose — shared service definitions
# Do not use directly. Use docker-compose.{dgx,mini,cloud}.yml.
version: "3.9"

x-oak-harness: &oak-harness-defaults
  image: oak/harness:latest
  restart: "no"
  networks: [oak-net]
  environment:
    ANTHROPIC_BASE_URL: http://oak-api-proxy:9000
    ANTHROPIC_AUTH_TOKEN: ollama
    ANTHROPIC_API_KEY: ""
    CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
    REDIS_URL: redis://oak-redis:6379
    DATABASE_URL: postgresql://oak:oak@oak-postgres:5432/oak
  volumes:
    - oak-data:/mnt/oak-data:ro
    - oak-skills:/mnt/oak-skills:ro
    - ./scripts/deny-patterns.txt:/workspace/scripts/deny-patterns.txt:ro
  depends_on:
    - oak-api-proxy
    - oak-redis
    - oak-postgres

services:
  oak-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks: [oak-net]
    environment:
      POSTGRES_USER: oak
      POSTGRES_PASSWORD: oak
      POSTGRES_DB: oak
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./api/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/00-init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oak"]
      interval: 10s
      timeout: 5s
      retries: 5

  oak-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [oak-net]
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  oak-api:
    image: oak/api:latest
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    networks: [oak-net]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://oak:oak@oak-postgres:5432/oak
      REDIS_URL: redis://oak-redis:6379
    depends_on:
      oak-postgres:
        condition: service_healthy
      oak-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  oak-api-proxy:
    image: oak/api-proxy:latest
    build:
      context: ./oak_mcp/oak-api-proxy
    restart: unless-stopped
    networks: [oak-net]
    ports:
      - "9000:9000"
    environment:
      OLLAMA_BASE_URL: http://oak-ollama:11434
      REDIS_URL: redis://oak-redis:6379
    depends_on:
      - oak-redis

networks:
  oak-net:
    driver: bridge
    internal: false  # harness containers get external access blocked at Dockerfile level

volumes:
  postgres-data:
  redis-data:
  oak-data:
  oak-skills:
